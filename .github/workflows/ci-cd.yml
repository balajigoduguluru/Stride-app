name: Stride Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 1. CONTINUOUS INTEGRATION (CI) JOB — MATRIX BUILD & TEST SUITE
  test-and-build:
    name: 🧪 CI Matrix Build & Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Vitest Automated Suite
        run: npx vitest run

      - name: Verify Production Vite Build
        run: npm run build

  # 2. CONTINUOUS DEPLOYMENT (CD) JOB — LIVE GITHUB PAGES DEPLOYMENT
  deploy-github-pages:
    name: 🚀 CD Deploy Live to GitHub Pages
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v4
